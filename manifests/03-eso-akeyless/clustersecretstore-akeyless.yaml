apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: akeyless
spec:
  provider:
    akeyless:
      # Point to your Akeyless Gateway API (not the SaaS API).
      # The gateway must be reachable from the cluster.
      akeylessGWApiURL: "https://your-gateway.example.com/api/v2"
      authSecretRef:
        secretRef:
          accessID:
            name: akeyless-auth
            namespace: external-secrets
            key: access-id
          accessType:
            name: akeyless-auth
            namespace: external-secrets
            key: access-type
          accessTypeParam:
            name: akeyless-auth
            namespace: external-secrets
            key: gcp-audience
