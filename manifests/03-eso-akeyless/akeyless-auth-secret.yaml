# K8s secret holding Akeyless auth config for ESO.
# This example uses GCP workload identity. For other auth types, change
# access-type to: aws_iam, azure_ad, access_key, k8s, etc.
apiVersion: v1
kind: Secret
metadata:
  name: akeyless-auth
  namespace: external-secrets
type: Opaque
stringData:
  access-id: "p-xxxxxxxxxx"          # Your Akeyless auth method access ID
  access-type: "gcp"                  # Auth type: gcp, aws_iam, azure_ad, access_key
  gcp-audience: "akeyless.io"         # GCP identity token audience
