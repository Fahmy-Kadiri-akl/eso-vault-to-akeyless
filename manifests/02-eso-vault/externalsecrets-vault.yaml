# ExternalSecrets pulling from Vault KV v2
# Vault stores multiple keys under one path (e.g. demo-app/database has host, port, username...)
# Each key is accessed via the "property" field on the remoteRef.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: demo-database
  namespace: demo
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: database-credentials
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: demo-app/database
        property: host
    - secretKey: port
      remoteRef:
        key: demo-app/database
        property: port
    - secretKey: username
      remoteRef:
        key: demo-app/database
        property: username
    - secretKey: password
      remoteRef:
        key: demo-app/database
        property: password
    - secretKey: database
      remoteRef:
        key: demo-app/database
        property: database
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: demo-api-keys
  namespace: demo
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: api-keys
    creationPolicy: Owner
  data:
    - secretKey: stripe_key
      remoteRef:
        key: demo-app/api-keys
        property: stripe_key
    - secretKey: sendgrid_key
      remoteRef:
        key: demo-app/api-keys
        property: sendgrid_key
    - secretKey: datadog_api_key
      remoteRef:
        key: demo-app/api-keys
        property: datadog_api_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: demo-config
  namespace: demo
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: app-config
    creationPolicy: Owner
  data:
    - secretKey: app_env
      remoteRef:
        key: demo-app/config
        property: app_env
    - secretKey: log_level
      remoteRef:
        key: demo-app/config
        property: log_level
    - secretKey: feature_flags
      remoteRef:
        key: demo-app/config
        property: feature_flags
