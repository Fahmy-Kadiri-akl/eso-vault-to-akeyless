apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"  # Change to your Vault address
      path: "secret"       # KV v2 mount path
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-role"
          serviceAccountRef:
            name: "vault-eso-auth"
            namespace: "external-secrets"
          secretRef:
            name: "vault-eso-auth-token"
            namespace: "external-secrets"
            key: "token"
