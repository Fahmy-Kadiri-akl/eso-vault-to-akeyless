# Final state: Akeyless ExternalSecrets targeting the ORIGINAL secret names.
# Apply this after removing the Vault ExternalSecrets. The app deployment
# does not need to change because the K8s secret names and keys are identical.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: akl-demo-database
  namespace: demo
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore
  target:
    name: database-credentials
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: /demo-app/database/host
    - secretKey: port
      remoteRef:
        key: /demo-app/database/port
    - secretKey: username
      remoteRef:
        key: /demo-app/database/username
    - secretKey: password
      remoteRef:
        key: /demo-app/database/password
    - secretKey: database
      remoteRef:
        key: /demo-app/database/database
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: akl-demo-api-keys
  namespace: demo
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore
  target:
    name: api-keys
    creationPolicy: Owner
  data:
    - secretKey: stripe_key
      remoteRef:
        key: /demo-app/api-keys/stripe_key
    - secretKey: sendgrid_key
      remoteRef:
        key: /demo-app/api-keys/sendgrid_key
    - secretKey: datadog_api_key
      remoteRef:
        key: /demo-app/api-keys/datadog_api_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: akl-demo-config
  namespace: demo
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore
  target:
    name: app-config
    creationPolicy: Owner
  data:
    - secretKey: app_env
      remoteRef:
        key: /demo-app/config/app_env
    - secretKey: log_level
      remoteRef:
        key: /demo-app/config/log_level
    - secretKey: feature_flags
      remoteRef:
        key: /demo-app/config/feature_flags
