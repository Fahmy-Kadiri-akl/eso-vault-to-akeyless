# Migration Phase: Akeyless ExternalSecrets deployed ALONGSIDE existing Vault ones.
# These create temporary "-akl" suffixed K8s secrets for validation.
#
# Akeyless secrets store JSON values, same structure as Vault KV v2.
# The "property" field extracts individual keys from the JSON, identical
# to how it works with Vault. Only the "key" path changes (add "/" prefix).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: akl-demo-database
  namespace: demo
  labels:
    migration-source: akeyless
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore
  target:
    name: database-credentials-akl
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: /demo-app/database
        property: host
    - secretKey: port
      remoteRef:
        key: /demo-app/database
        property: port
    - secretKey: username
      remoteRef:
        key: /demo-app/database
        property: username
    - secretKey: password
      remoteRef:
        key: /demo-app/database
        property: password
    - secretKey: database
      remoteRef:
        key: /demo-app/database
        property: database
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: akl-demo-api-keys
  namespace: demo
  labels:
    migration-source: akeyless
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore
  target:
    name: api-keys-akl
    creationPolicy: Owner
  data:
    - secretKey: stripe_key
      remoteRef:
        key: /demo-app/api-keys
        property: stripe_key
    - secretKey: sendgrid_key
      remoteRef:
        key: /demo-app/api-keys
        property: sendgrid_key
    - secretKey: datadog_api_key
      remoteRef:
        key: /demo-app/api-keys
        property: datadog_api_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: akl-demo-config
  namespace: demo
  labels:
    migration-source: akeyless
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore
  target:
    name: app-config-akl
    creationPolicy: Owner
  data:
    - secretKey: app_env
      remoteRef:
        key: /demo-app/config
        property: app_env
    - secretKey: log_level
      remoteRef:
        key: /demo-app/config
        property: log_level
    - secretKey: feature_flags
      remoteRef:
        key: /demo-app/config
        property: feature_flags
