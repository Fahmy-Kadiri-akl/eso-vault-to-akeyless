# Zero-downtime cutover using creationPolicy: Merge
#
# Unlike "Owner" policy, "Merge" does NOT delete the K8s Secret when the
# ExternalSecret is removed. This eliminates the gap where a secret
# briefly does not exist during cutover.
#
# Cutover sequence with Merge:
#   1. Apply these (Akeyless writes into the SAME K8s secrets Vault created)
#   2. Verify secrets still resolve
#   3. Delete Vault ExternalSecrets (K8s secrets persist, no ownerRef cleanup)
#   4. App never sees a disruption
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: akl-demo-database
  namespace: demo
  labels:
    migration-source: akeyless
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore
  target:
    name: database-credentials
    creationPolicy: Merge
  data:
    - secretKey: host
      remoteRef:
        key: /demo-app/database
        property: host
    - secretKey: port
      remoteRef:
        key: /demo-app/database
        property: port
    - secretKey: username
      remoteRef:
        key: /demo-app/database
        property: username
    - secretKey: password
      remoteRef:
        key: /demo-app/database
        property: password
    - secretKey: database
      remoteRef:
        key: /demo-app/database
        property: database
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: akl-demo-api-keys
  namespace: demo
  labels:
    migration-source: akeyless
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore
  target:
    name: api-keys
    creationPolicy: Merge
  data:
    - secretKey: stripe_key
      remoteRef:
        key: /demo-app/api-keys
        property: stripe_key
    - secretKey: sendgrid_key
      remoteRef:
        key: /demo-app/api-keys
        property: sendgrid_key
    - secretKey: datadog_api_key
      remoteRef:
        key: /demo-app/api-keys
        property: datadog_api_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: akl-demo-config
  namespace: demo
  labels:
    migration-source: akeyless
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore
  target:
    name: app-config
    creationPolicy: Merge
  data:
    - secretKey: app_env
      remoteRef:
        key: /demo-app/config
        property: app_env
    - secretKey: log_level
      remoteRef:
        key: /demo-app/config
        property: log_level
    - secretKey: feature_flags
      remoteRef:
        key: /demo-app/config
        property: feature_flags
